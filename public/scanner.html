<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Scanner TOKO ZHAFRAN</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body class="scanner-body">
  <header class="scanner-header">
    <div style="font-weight: 900; color: var(--primary-color); letter-spacing: 1px; margin-bottom: 5px;">TOKO ZHAFRAN</div>
    📷 Mode Pemindai
    <div style="margin-top: 10px;">
      <select id="camera-select" style="padding: 5px; width: 80%; max-width: 300px; font-size: 16px; border-radius: 5px;">
        <option value="">Memuat Kamera...</option>
      </select>
    </div>
    <div class="mode-toggle" style="margin-top: 10px; font-size: 14px;">
      <label><input type="radio" name="hp-mode" value="barcode" checked> 📱 Barcode</label>
      <label style="margin-left:10px;"><input type="radio" name="hp-mode" value="ai"> 🤖 Deteksi Benda</label>
    </div>
  </header>

  <div id="reader-container" style="position:relative; flex: 1; width: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden;">
    <div id="ai-loading" style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); color:white; align-items:center; justify-content:center; z-index:10;">Memuat Model AI...</div>
    <div id="reader" style="width: 100%; height: 100%;"></div>
    <canvas id="hp-ai-canvas" style="position:absolute; top:0; left:0; width:100%; height:100%; z-index:5; pointer-events:none;"></canvas>
  </div>

  <footer class="scanner-footer" id="status-footer">
    Koneksi Terputus...
  </footer>

  <!-- html5-qrcode library from CDN -->
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <!-- Load TensorFlow.js -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <!-- Load COCO-SSD model -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
  <!-- Socket.io -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="/scanner.js"></script>
</body>
</html>
